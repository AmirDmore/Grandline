<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grand Line - Demo V4</title>
  <style>
    :root{--bg:#0a111a;--panel:#15263a;--line:rgba(255,255,255,.12);--text:#eef5ff;--muted:#98b2cc;--gold:#efc05a}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#234766 0%,#0a111a 55%);color:var(--text)}
    #app{min-height:100vh}.screen{display:none;min-height:100vh}.screen.active{display:block}.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(1240px,100%);background:linear-gradient(180deg,rgba(21,38,58,.98),rgba(11,20,31,.98));border:1px solid var(--line);border-radius:24px;box-shadow:0 25px 80px rgba(0,0,0,.35)}
    .small{color:var(--muted);font-size:13px}button{border:0;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:700;background:linear-gradient(180deg,#61b7ff,#2f8fe6);color:white}button.alt{background:linear-gradient(180deg,#ffd76d,#d8a031);color:#1a1a1a}button.ghost{background:transparent;border:1px solid var(--line)}button:disabled{opacity:.5;cursor:not-allowed}
    .create-header{padding:24px 28px 10px}.create-stage{padding:10px 28px 28px;display:grid;gap:18px;background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.08))}.wanted-row{display:grid;grid-template-columns:repeat(6,1fr);gap:18px}
    .poster{background:linear-gradient(180deg,#e4d2aa,#c8b389);color:#2a1d0b;border:2px solid #8a6f43;border-radius:8px;padding:10px;box-shadow:0 10px 20px rgba(0,0,0,.25);cursor:pointer;transform:rotate(-1.5deg)}.poster:nth-child(2n){transform:rotate(1.2deg)}.poster.selected{border-color:#f0c25c;box-shadow:0 0 0 3px rgba(240,194,92,.35),0 12px 22px rgba(0,0,0,.35)}.wanted{font-weight:900;font-size:28px;letter-spacing:2px;text-align:center;margin-bottom:8px}.portrait{height:150px;border:2px solid #503b21;border-radius:4px;background:linear-gradient(180deg,#2c3f54,#182432);display:flex;align-items:center;justify-content:center;font-size:54px;color:white;margin-bottom:10px}.role{font-weight:900;color:#9a3d00;text-align:center;font-size:28px}.sub{text-align:center;font-size:12px}.start-row{display:flex;justify-content:space-between;align-items:center;padding:0 28px 28px}
    .topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.18)}.top-left{display:flex;gap:14px;align-items:center}.avatar{width:86px;height:86px;border-radius:50%;background:linear-gradient(180deg,#35597c,#223346);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;border:3px solid rgba(255,255,255,.16)}.name strong{display:block;font-size:24px}.resources{display:flex;gap:10px;flex-wrap:wrap}.res{min-width:110px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:10px 12px}.res span{display:block;color:var(--muted);font-size:12px}
    .town{display:grid;grid-template-columns:220px 1fr 310px;gap:14px;padding:16px}.panel{background:linear-gradient(180deg,rgba(20,38,59,.92),rgba(13,23,35,.92));border:1px solid var(--line);border-radius:18px;overflow:hidden}.panel h2{margin:0;padding:14px 16px;border-bottom:1px solid var(--line);font-size:22px}.list{display:grid;gap:10px;padding:14px}.item{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:12px}
    .scene{position:relative;min-height:620px;background:linear-gradient(180deg,rgba(105,180,255,.18),rgba(8,16,26,.12));overflow:hidden}.scene-top{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px}.icon-btn{background:linear-gradient(180deg,rgba(255,214,120,.18),rgba(255,255,255,.05));border:1px solid rgba(255,211,128,.28);border-radius:12px;padding:10px;text-align:center;font-weight:700}.world{position:absolute;left:16px;right:16px;top:106px;bottom:86px;border-radius:18px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));display:flex;align-items:flex-end;justify-content:space-between;padding:18px}.npc,.player,.pet{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.06));border:1px solid rgba(255,255,255,.16);border-radius:18px;color:white;font-weight:800}.npc{width:120px;height:220px;font-size:28px}.player{width:180px;height:280px;font-size:72px;border:2px solid rgba(240,194,92,.42)}.pet{width:150px;height:160px;font-size:40px}.dock{position:absolute;left:12px;right:12px;bottom:12px;display:grid;grid-template-columns:repeat(10,1fr);gap:10px}.dock .item{text-align:center;padding:10px}
    .overlay{position:fixed;inset:0;background:rgba(4,9,15,.78);display:none;align-items:center;justify-content:center;padding:18px;z-index:5}.overlay.active{display:flex}.modal{width:min(1250px,100%);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#16283d,#0e1928);border:1px solid var(--line);border-radius:22px}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}.crew-layout{display:grid;grid-template-columns:220px 1fr 320px;gap:14px;padding:16px}.crew-list{display:grid;gap:10px}.crew-entry,.slot,.battle-card{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:12px}.crew-entry.active{box-shadow:0 0 0 2px rgba(74,168,255,.35) inset}.sheet{display:grid;grid-template-columns:260px 1fr;gap:14px}.sheet-art{min-height:340px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.05));display:flex;align-items:center;justify-content:center;font-size:78px;font-weight:800}.equip{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .battle-wrap{padding:16px}.battle-top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:14px}.battle-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}.team{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.hp{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px}.hp>div{height:100%;background:linear-gradient(90deg,#3ddc97,#1cb5e0)}.battle-log{margin-top:14px;display:grid;gap:8px;max-height:180px;overflow:auto}
    @media(max-width:1200px){.wanted-row{grid-template-columns:repeat(3,1fr)}.town{grid-template-columns:1fr}.crew-layout{grid-template-columns:1fr}.sheet{grid-template-columns:1fr}.dock{grid-template-columns:repeat(5,1fr)}.battle-grid{grid-template-columns:1fr}} @media(max-width:760px){.wanted-row{grid-template-columns:repeat(2,1fr)}.scene-top{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
<div id='app'></div>
<script>
const DATA={starters:[{id:'summoner',name:'Summoner',icon:'🌀',role:'SUMMONER'},{id:'swordwomen',name:'Swordwomen',icon:'⚔️',role:'SWORDWOMEN'},{id:'magician',name:'Magician',icon:'✨',role:'MAGICIAN'},{id:'swordsman',name:'Swordsman',icon:'🗡️',role:'SWORDSMAN'},{id:'gunner',name:'Gunner',icon:'🔫',role:'GUNNER'},{id:'archer',name:'Archer',icon:'🏹',role:'ARCHER'}],topIcons:['TOP UP','GIFT','SALARY','ACTIVITY','DAY TASK','DAILY','SPIRIT','ARENA','3V3','WORLD'],actions:['GROWTH TREE','GIFTS','LIMITED EVENT','SHOP EVENT','FORTUNE WHEEL','DIGGING TREASURE','ALL BLUE','HAKI','PRODUCTION','TR. HUNT','ARENA','INTER-SERVER','CHECKPOINT','BLOODY BATTLE','IMPEL DOWN'],dock:['PIRATE SHIP','DIARY','FLAG PIRATE','CREW','PET','EIF','BAG','FORM','GEM','ENHC','ZODIAC','RSCH','SOCIAL','TEAM','INFO','EXP'],quests:['Defeat Fuka Boss 0/5','Defeat Zombie Generals 0/5','Beat Puzzle 0/5','Upgrade one gear piece','Win one arena battle'],crew:[{name:'Starter Hero',rarity:'Epic',role:'Captain',icon:'⚔️',stats:{str:218,agi:226,int:220,atk:71909,def:66638,mdef:52920,hp:'2.7B/2.8B'},skill:'Thermal Heat'},{name:'Captain Blaze',rarity:'Epic',role:'Warrior',icon:'🔥',stats:{str:210,agi:188,int:120,atk:62100,def:42000,mdef:30000,hp:'1.8B/1.8B'},skill:'Blazing Rush'},{name:'Grave Singer Nyx',rarity:'Legendary',role:'Mage',icon:'🌑',stats:{str:120,agi:170,int:260,atk:80200,def:31000,mdef:41000,hp:'1.4B/1.5B'},skill:'Void Chorus'},{name:'Storm Giant Grom',rarity:'Legendary',role:'Tank',icon:'⚡',stats:{str:280,agi:90,int:110,atk:70000,def:80220,mdef:52000,hp:'3.2B/3.5B'},skill:'Thunder Guard'}],enemies:[{name:'Smoothie S',icon:'🩷'},{name:'Super Zoro-H',icon:'🟣'},{name:'Luffy G4-S',icon:'🔥'},{name:'Killer',icon:'🪓'}]};
const SAVE='grandline-v4';let state=load();function def(){return{screen:'create',starter:null,name:'AmirDmor',level:179,power:7236349,gold:'8.346B',gems:'3.530B',tickets:12,vitality:'12548/50000',showCrew:false,showBattle:false,selectedCrew:0,crewHp:[100,100,100,100],enemyHp:[100,100,100,100],battleLog:['Welcome to Pirate King - The Grand Line.']}}function load(){try{return Object.assign(def(),JSON.parse(localStorage.getItem(SAVE)||'{}'))}catch{return def()}}function save(){localStorage.setItem(SAVE,JSON.stringify(state))}function starter(){return DATA.starters.find(x=>x.id===state.starter)||DATA.starters[3]}function crewList(){const list=JSON.parse(JSON.stringify(DATA.crew));list[0].name=starter().name;list[0].role=starter().role;list[0].icon=starter().icon;return list}function el(t,c,h){const x=document.createElement(t);if(c)x.className=c;if(h!==undefined)x.innerHTML=h;return x}function btn(label,cls,fn){const b=document.createElement('button');b.className=cls||'';b.textContent=label;if(fn)b.onclick=fn;return b}
function mount(){const app=document.getElementById('app');app.innerHTML='';app.appendChild(state.screen==='create'?renderCreate():renderTown());app.appendChild(renderCrew());app.appendChild(renderBattle())}
function renderCreate(){const wrap=el('div','screen active center');const card=el('div','card');card.appendChild(el('div','create-header','<h1>Create Your Hero</h1><div class="small">Choose your wanted poster and begin the adventure.</div>'));const stage=el('div','create-stage');const row=el('div','wanted-row');DATA.starters.forEach(h=>{const p=el('div','poster'+(state.starter===h.id?' selected':''));p.innerHTML='<div class="wanted">WANTED</div><div class="portrait">'+h.icon+'</div><div class="role">'+h.role+'</div><div class="sub">B 1000000000</div>';p.onclick=()=>{state.starter=h.id;save();mount()};row.appendChild(p)});stage.appendChild(row);card.appendChild(stage);const foot=el('div','start-row');foot.appendChild(el('div','small',state.starter?'Selected: '+starter().name:'Choose a hero poster first'));const start=btn('Start Game','alt',()=>{if(!state.starter)return;state.screen='town';save();mount()});start.disabled=!state.starter;foot.appendChild(start);card.appendChild(foot);wrap.appendChild(card);return wrap}
function renderTown(){const root=el('div','screen active');const top=el('div','topbar');top.innerHTML='<div class="top-left"><div class="avatar">'+starter().icon+'</div><div class="name"><strong>'+state.name+'</strong><div class="small">Lv.'+state.level+' · Power: '+state.power.toLocaleString()+'</div><div class="small">Vitality '+state.vitality+'</div></div></div>';const rs=el('div','resources');[['Gold',state.gold],['Gems',state.gems],['Tickets',state.tickets]].forEach(([n,v])=>rs.appendChild(el('div','res','<span>'+n+'</span><strong>'+v+'</strong>')));top.appendChild(rs);root.appendChild(top);const town=el('div','town');const left=el('div','panel');left.appendChild(el('h2','', 'Town Status'));const llist=el('div','list');['Battle Available','Train Available','Kitchen Available','Study Available','Sail Available','Enhance Available','Mine Status','Event List'].forEach(x=>llist.appendChild(el('div','item',x)));left.appendChild(llist);const mid=el('div','panel');mid.appendChild(el('h2','', 'Fishman Island'));const scene=el('div','scene');const topIcons=el('div','scene-top');DATA.topIcons.forEach(x=>topIcons.appendChild(el('div','icon-btn',x)));scene.appendChild(topIcons);const world=el('div','world');world.appendChild(el('div','npc','NPC'));world.appendChild(el('div','player',starter().icon));world.appendChild(el('div','pet','🐉'));scene.appendChild(world);const dock=el('div','dock');DATA.dock.forEach(x=>{const d=el('div','item',x);if(x==='CREW')d.onclick=()=>{state.showCrew=true;save();mount()};if(x==='TEAM'||x==='FORM')d.onclick=()=>{state.showBattle=true;save();mount()};dock.appendChild(d)});scene.appendChild(dock);mid.appendChild(scene);const actionWrap=el('div','list');actionWrap.style.gridTemplateColumns='repeat(5,1fr)';DATA.actions.forEach(x=>{const a=el('div','item',x);if(x==='ARENA'||x==='BLOODY BATTLE')a.onclick=()=>{state.showBattle=true;save();mount()};actionWrap.appendChild(a)});mid.appendChild(actionWrap);const right=el('div','panel');right.appendChild(el('h2','', 'Quest Tracker'));const q=el('div','list');DATA.quests.forEach(x=>q.appendChild(el('div','item',x)));right.appendChild(q);town.appendChild(left);town.appendChild(mid);town.appendChild(right);root.appendChild(town);return root}
function renderCrew(){const ov=el('div','overlay'+(state.showCrew?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Crew</h2>');head.appendChild(btn('Close','ghost',()=>{state.showCrew=false;save();mount()}));modal.appendChild(head);const body=el('div','crew-layout');const list=el('div','crew-list');crewList().forEach((c,i)=>{const it=el('div','crew-entry'+(i===state.selectedCrew?' active':''),'<strong>'+c.name+'</strong><div class="small">'+c.rarity+' · '+c.role+'</div>');it.onclick=()=>{state.selectedCrew=i;save();mount()};list.appendChild(it)});const c=crewList()[state.selectedCrew];const center=el('div','sheet');center.appendChild(el('div','sheet-art',c.icon));const stats=el('div','');stats.appendChild(el('div','battle-card','<strong>Lv.'+state.level+' '+state.name+'</strong><div class="small">Skill: '+c.skill+'</div><div class="small">STR '+c.stats.str+' · AGI '+c.stats.agi+' · INT '+c.stats.int+'</div><div class="small">P.Atk '+c.stats.atk+' · P.Def '+c.stats.def+' · M.Def '+c.stats.mdef+'</div><div class="small">HP '+c.stats.hp+'</div>'));const eq=el('div','equip');['Weapon','Helmet','Armor','Accessory','Fruit','Talent','Wing','Artifact'].forEach(x=>eq.appendChild(el('div','slot','<strong>'+x+'</strong><div class="small">Basic/Locked</div>')));stats.appendChild(eq);const row=el('div','row');row.appendChild(btn('Advance'));row.appendChild(btn('Skills','ghost'));row.appendChild(btn('Develop','ghost'));stats.appendChild(row);center.appendChild(stats);const right=el('div','crew-list');['Equipment Items','Bag Page 1/7','Talent Panel','Devil Fruit'].forEach(x=>right.appendChild(el('div','slot',x)));body.appendChild(list);body.appendChild(center);body.appendChild(right);modal.appendChild(body);ov.appendChild(modal);return ov}
function battleCard(name,icon,hp){const c=el('div','battle-card','<strong>'+name+'</strong><div class="small">'+icon+'</div>');const bar=el('div','hp');const fill=el('div','');fill.style.width=hp+'%';bar.appendChild(fill);c.appendChild(bar);return c}
function fight(){state.crewHp=state.crewHp.map(x=>Math.max(20,x-(Math.floor(Math.random()*15))));state.enemyHp=state.enemyHp.map(x=>Math.max(0,x-(20+Math.floor(Math.random()*30))));state.battleLog=[''+starter().name+' unleashes a combo.','Your team triggers support buffs.','Enemy side takes heavy damage.',state.enemyHp.every(x=>x===0)?'Victory! Rewards gained.':'Battle continues...'];if(state.enemyHp.every(x=>x===0)){state.gold='8.347B';state.gems='3.531B';state.enemyHp=[100,100,100,100];state.crewHp=[100,100,100,100]}save();mount()}
function renderBattle(){const ov=el('div','overlay'+(state.showBattle?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Battle Arena</h2>');head.appendChild(btn('Close','ghost',()=>{state.showBattle=false;save();mount()}));modal.appendChild(head);const wrap=el('div','battle-wrap');wrap.appendChild(el('div','battle-top','<div><strong>'+state.name+'</strong><div class="small">Rounds 01</div></div><div><strong>System Enemy</strong><div class="small">Arena Match</div></div>'));const grid=el('div','battle-grid');const left=el('div','team');crewList().slice(0,4).forEach((c,i)=>left.appendChild(battleCard(c.name,c.icon,state.crewHp[i])));const right=el('div','team');DATA.enemies.forEach((c,i)=>right.appendChild(battleCard(c.name,c.icon,state.enemyHp[i])));grid.appendChild(left);grid.appendChild(right);wrap.appendChild(grid);const row=el('div','row');row.appendChild(btn('Fight','',fight));row.appendChild(btn('Auto','ghost'));row.appendChild(btn('Skip','ghost'));wrap.appendChild(row);const log=el('div','battle-log');state.battleLog.forEach(x=>log.appendChild(el('div','battle-card',x)));wrap.appendChild(log);modal.appendChild(wrap);ov.appendChild(modal);return ov}
mount();
</script>
</body>
</html>
