<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grand Line - Demo V6</title>
  <style>
    :root{
      --bg:#0a1018;
      --panel:#16283c;
      --panel-dark:#0f1a28;
      --panel-soft:#213650;
      --line:rgba(255,255,255,.12);
      --text:#eef5ff;
      --muted:#9eb5ca;
      --gold:#e9c163;
      --gold-dark:#9b6e18;
      --blue:#57b2ff;
      --green:#39d18b;
      --danger:#ff7c7c;
      --purple:#c590ff;
      --shadow:0 14px 34px rgba(0,0,0,.34);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#274d6d 0%,#0a1018 55%);color:var(--text);overflow-x:hidden}
    button{border:0;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:700;background:linear-gradient(180deg,#63bbff,#2d91e9);color:white}
    button.alt{background:linear-gradient(180deg,#ffe08c,#dca53d);color:#1c1608}
    button.ghost{background:rgba(255,255,255,.04);border:1px solid var(--line)}
    button:disabled{opacity:.45;cursor:not-allowed}
    .screen{display:none;min-height:100vh}.screen.active{display:block}
    .center-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:min(1280px,100%);background:linear-gradient(180deg,rgba(22,40,60,.98),rgba(9,17,27,.98));border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
    .small{font-size:13px;color:var(--muted)}
    .muted{color:var(--muted)}
    .panel{background:linear-gradient(180deg,rgba(22,40,60,.94),rgba(11,20,31,.94));border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
    .panel h2{margin:0;padding:14px 16px;border-bottom:1px solid var(--line);font-size:22px}
    .panel-body{padding:14px}
    .list{display:grid;gap:10px}
    .item{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:12px}

    .create-shell{position:relative;overflow:hidden}
    .create-shell:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(233,193,99,.08),transparent 42%),linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.28));pointer-events:none}
    .create-head{padding:26px 30px 8px;position:relative;z-index:1}
    .create-head h1{margin:0;font-size:60px;line-height:1;font-weight:900;color:#ffb21f;text-shadow:0 4px 0 rgba(0,0,0,.45)}
    .create-board{padding:10px 30px 28px;display:grid;gap:18px;position:relative;z-index:1}
    .wanted-row{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;align-items:end}
    .poster{background:linear-gradient(180deg,#e7d6ad,#ccb587);color:#261b0c;border:2px solid #83663b;border-radius:8px;padding:10px 10px 14px;box-shadow:0 12px 20px rgba(0,0,0,.28);cursor:pointer;transform:rotate(-1.4deg);transition:.18s ease}
    .poster:nth-child(2n){transform:rotate(1.2deg)}
    .poster:hover{transform:translateY(-4px) scale(1.01)}
    .poster.selected{box-shadow:0 0 0 3px rgba(233,193,99,.4),0 16px 24px rgba(0,0,0,.36);border-color:var(--gold)}
    .wanted{font-size:28px;font-weight:900;letter-spacing:2px;text-align:center;margin-bottom:8px}
    .poster-art{height:156px;border:2px solid #513c20;border-radius:4px;background:linear-gradient(180deg,#30485f,#182535);position:relative;overflow:hidden;margin-bottom:10px}
    .poster-art:before,.poster-art:after{content:'';position:absolute}
    .poster-art:before{left:50%;transform:translateX(-50%);bottom:16px;width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.18)}
    .poster-art:after{left:50%;transform:translateX(-50%);bottom:-6px;width:110px;height:90px;border-radius:60px 60px 22px 22px;background:rgba(255,255,255,.14)}
    .class-tag{position:absolute;left:10px;top:10px;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800;background:rgba(0,0,0,.28);color:#fff;border:1px solid rgba(255,255,255,.18)}
    .class-mark{position:absolute;right:10px;bottom:10px;width:52px;height:52px;border-radius:14px;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff}
    .poster-role{font-size:24px;font-weight:900;text-align:center;color:#0b7bb3;text-shadow:0 1px 0 #fff}
    .poster-bounty{text-align:center;font-size:12px;margin-top:6px}
    .start-row{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:0 30px 26px;position:relative;z-index:1}
    .selector-bar{height:22px;border-radius:999px;background:#06131d;border:2px solid #0d2432;position:relative;overflow:hidden;min-width:260px}
    .selector-fill{position:absolute;inset:3px auto 3px 3px;width:40%;border-radius:999px;background:linear-gradient(90deg,rgba(87,178,255,.8),rgba(233,193,99,.8))}
    .selector-dice{position:absolute;right:56px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:8px;background:#111;border:1px solid #fff3;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}

    .topbar{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.18);position:sticky;top:0;z-index:2}
    .top-left{display:flex;gap:14px;align-items:center}
    .avatar{width:86px;height:86px;border-radius:50%;background:linear-gradient(180deg,#416483,#203347);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;border:3px solid rgba(255,255,255,.16);position:relative;overflow:hidden}
    .avatar:before{content:'';position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.16)}
    .avatar:after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:66px;height:58px;border-radius:34px 34px 18px 18px;background:rgba(255,255,255,.12)}
    .avatar span{position:relative;z-index:1;font-size:13px;letter-spacing:1px}
    .name strong{display:block;font-size:24px}
    .power-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
    .pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:12px}
    .resources{display:flex;gap:10px;flex-wrap:wrap}.res{min-width:112px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:10px 12px}.res span{display:block;color:var(--muted);font-size:12px}

    .town-layout{display:grid;grid-template-columns:230px 1fr 320px;gap:14px;padding:16px}
    .chat-box{margin-top:12px;height:240px;display:grid;grid-template-rows:1fr auto}.chat-log{padding:12px;display:grid;gap:10px;overflow:auto;background:rgba(0,0,0,.12);border-bottom:1px solid var(--line)}.chat-tabs{display:flex;gap:8px;padding:10px}.chat-tab{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:12px}
    .hub{position:relative;min-height:720px;background:linear-gradient(180deg,rgba(84,168,230,.18),rgba(10,16,24,.14));overflow:hidden}
    .system-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px}
    .system-btn,.action-btn{border-radius:12px;padding:10px;text-align:center;font-weight:800;cursor:pointer;position:relative;overflow:hidden}
    .system-btn{background:linear-gradient(180deg,rgba(255,208,120,.18),rgba(255,255,255,.05));border:1px solid rgba(255,211,128,.28)}
    .action-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:0 14px 14px}
    .action-btn{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--line)}
    .system-btn:before,.action-btn:before{content:'';position:absolute;inset:auto auto 8px 8px;width:18px;height:18px;border-radius:6px;background:rgba(255,255,255,.12)}
    .world-stage{position:absolute;left:14px;right:14px;top:160px;bottom:88px;border-radius:18px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));display:flex;align-items:flex-end;justify-content:space-between;padding:18px;overflow:hidden}
    .world-stage:before{content:'';position:absolute;left:-10%;right:-10%;bottom:0;height:130px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.08));transform:skewY(-2deg)}
    .sprite{display:flex;align-items:flex-end;justify-content:center;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.06));border:1px solid rgba(255,255,255,.16);box-shadow:0 14px 24px rgba(0,0,0,.22);position:relative;overflow:hidden}
    .sprite .label{position:absolute;top:8px;left:8px;padding:4px 8px;border-radius:999px;background:rgba(0,0,0,.26);border:1px solid rgba(255,255,255,.18);font-size:11px;font-weight:800;color:#fff}
    .sprite .silhouette{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.18)}
    .sprite .body{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:110px;height:110px;border-radius:60px 60px 20px 20px;background:rgba(255,255,255,.13)}
    .sprite.npc{width:110px;height:220px}.sprite.player{width:190px;height:286px;border:2px solid rgba(233,193,99,.44)}.sprite.pet{width:160px;height:170px}.sprite.mount{width:200px;height:150px}
    .sprite.mount .body{width:150px;height:90px;border-radius:40px}
    .vice-btn{position:absolute;right:220px;bottom:96px;padding:8px 12px;border-radius:12px;background:linear-gradient(180deg,#ffd983,#d4a63b);color:#2b200e;font-weight:800;border:1px solid #7d5e25}
    .dock{position:absolute;left:12px;right:12px;bottom:12px;display:grid;grid-template-columns:repeat(8,1fr);gap:10px}.dock .item{text-align:center;padding:10px;font-weight:700;cursor:pointer}
    .mini-menu{position:absolute;right:12px;top:12px;display:grid;gap:8px}.mini-menu .item{text-align:center;padding:10px 12px;font-size:12px}

    .overlay{position:fixed;inset:0;background:rgba(4,9,15,.78);display:none;align-items:center;justify-content:center;padding:18px;z-index:5}.overlay.active{display:flex}
    .modal{width:min(1280px,100%);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#16283d,#0e1928);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
    .tab-row{display:flex;gap:10px;padding:0 16px 16px}.tab{padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--line);cursor:pointer;font-weight:700}.tab.active{border-color:var(--gold);color:var(--gold)}

    .crew-layout{display:grid;grid-template-columns:230px 1fr 330px;gap:14px;padding:16px}.crew-list{display:grid;gap:10px}.crew-entry,.slot,.battle-card,.summon-card{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:12px}.crew-entry.active{box-shadow:0 0 0 2px rgba(83,176,255,.35) inset}
    .sheet{display:grid;grid-template-columns:260px 1fr;gap:14px}.sheet-art{min-height:360px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.05));position:relative;overflow:hidden}
    .sheet-art .silhouette{position:absolute;left:50%;transform:translateX(-50%);bottom:30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.18)}
    .sheet-art .body{position:absolute;left:50%;transform:translateX(-50%);bottom:-10px;width:170px;height:170px;border-radius:80px 80px 24px 24px;background:rgba(255,255,255,.12)}
    .sheet-art .nameplate{position:absolute;top:12px;left:12px;padding:6px 10px;border-radius:999px;background:rgba(0,0,0,.26);border:1px solid rgba(255,255,255,.18);font-weight:800}
    .equip{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .inventory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.inventory-grid .slot{height:78px;display:flex;align-items:center;justify-content:center}

    .summon-layout{padding:16px;display:grid;grid-template-columns:1fr 320px;gap:14px}.summon-stage{min-height:400px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--line);padding:14px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:start}.summon-poster{background:linear-gradient(180deg,#ead9b0,#ccb688);color:#261b0c;border:2px solid #83663b;border-radius:8px;padding:10px;text-align:center}.summon-poster .art{height:110px;background:linear-gradient(180deg,#30485f,#182535);border:2px solid #503c1f;border-radius:4px;position:relative;overflow:hidden;margin-bottom:8px}.summon-poster .art:before{content:'';position:absolute;left:50%;transform:translateX(-50%);bottom:14px;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.18)}.summon-poster .art:after{content:'';position:absolute;left:50%;transform:translateX(-50%);bottom:-4px;width:78px;height:70px;border-radius:40px 40px 18px 18px;background:rgba(255,255,255,.12)}

    .battle-wrap{padding:16px}.battle-top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:14px}.battle-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}.team{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.hp{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px}.hp>div{height:100%;background:linear-gradient(90deg,#3ddc97,#1cb5e0)}.battle-log{margin-top:14px;display:grid;gap:8px;max-height:180px;overflow:auto}
    .effect-layer{position:relative;min-height:180px;margin-top:14px;border-radius:16px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));overflow:hidden}.effect{position:absolute;border-radius:999px;filter:blur(4px);opacity:.72;animation:pulse 1.2s infinite}.e1{left:10%;top:26%;width:90px;height:90px;background:#7dff7a55}.e2{right:18%;top:18%;width:120px;height:120px;background:#ffb34755}.e3{left:40%;bottom:12%;width:140px;height:52px;background:#66d0ff55;border-radius:50px}.e4{right:8%;bottom:10%;width:90px;height:90px;background:#ff5c8a44}.pulse-ring{position:absolute;inset:auto auto 18px 44%;width:90px;height:90px;border:3px solid rgba(112,219,255,.38);border-radius:50%;animation:ring 1.8s infinite}
    @keyframes pulse{0%{transform:scale(.8);opacity:.4}50%{transform:scale(1.08);opacity:.8}100%{transform:scale(.82);opacity:.4}} @keyframes ring{0%{transform:scale(.7);opacity:.6}100%{transform:scale(1.4);opacity:0}}

    @media(max-width:1240px){.wanted-row{grid-template-columns:repeat(3,1fr)}.town-layout{grid-template-columns:1fr}.crew-layout,.summon-layout{grid-template-columns:1fr}.sheet{grid-template-columns:1fr}.dock{grid-template-columns:repeat(4,1fr)}.battle-grid{grid-template-columns:1fr}.system-grid,.action-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:760px){.wanted-row{grid-template-columns:repeat(2,1fr)}.system-grid,.action-grid{grid-template-columns:repeat(2,1fr)}.stats-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const DATA={
  starters:[
    {id:'summoner',name:'Summoner',role:'SUMMONER',mark:'SM',desc:'Utility, buffs, spirit summons'},
    {id:'swordwomen',name:'Swordwomen',role:'SWORDWOMEN',mark:'SW',desc:'Fast melee duelist'},
    {id:'magician',name:'Magician',role:'MAGICIAN',mark:'MG',desc:'AoE spells and control'},
    {id:'swordsman',name:'Swordsman',role:'SWORDSMAN',mark:'SS',desc:'Balanced frontline attacker'},
    {id:'gunner',name:'Gunner',role:'GUNNER',mark:'GN',desc:'Ranged burst and crits'},
    {id:'archer',name:'Archer',role:'ARCHER',mark:'AR',desc:'Precision shots and speed'}
  ],
  topIcons:['TOP UP','GIFT','SALARY','ACTIVITY','DAY TASK','DAILY','SPIRIT','BATTLE ARENA','ARENA WAR','WORLD'],
  actions:['GROWTH TREE','GIFTS','LIMITED EVENT','SHOP EVENT','FORTUNE WHEEL','DIGGING TREASURE','ALL BLUE','HAKI','PRODUCTION','TR. HUNT','ARENA','INTER-SERVER','CHECKPOINT','BLOODY BATTLE','IMPEL DOWN'],
  dock:['PIRATE SHIP','DIARY','FLAG PIRATE','CREW','PET','EIF','BAG','FORM','GEM','ENHC','ZODIAC','RSCH','SOCIAL','TEAM','INFO','EXP'],
  quests:['Defeat Fuka Boss 0/5','Defeat Zombie Generals 0/5','Beat Puzzle 0/5','Upgrade one gear piece','Win one arena battle'],
  crew:[
    {name:'Starter Hero',rarity:'Epic',role:'Captain',mark:'CP',stats:{str:218,agi:226,int:220,atk:71909,def:66638,mdef:52920,hp:'2.7B/2.8B'},skill:'Thermal Heat'},
    {name:'Captain Blaze',rarity:'Epic',role:'Warrior',mark:'CB',stats:{str:210,agi:188,int:120,atk:62100,def:42000,mdef:30000,hp:'1.8B/1.8B'},skill:'Blazing Rush'},
    {name:'Grave Singer Nyx',rarity:'Legendary',role:'Mage',mark:'NY',stats:{str:120,agi:170,int:260,atk:80200,def:31000,mdef:41000,hp:'1.4B/1.5B'},skill:'Void Chorus'},
    {name:'Storm Giant Grom',rarity:'Legendary',role:'Tank',mark:'GG',stats:{str:280,agi:90,int:110,atk:70000,def:80220,mdef:52000,hp:'3.2B/3.5B'},skill:'Thunder Guard'},
    {name:'Oracle Sera',rarity:'Mythic',role:'Support',mark:'OS',stats:{str:140,agi:200,int:300,atk:84000,def:38000,mdef:63000,hp:'1.9B/2.0B'},skill:'Fate Shift'}
  ],
  enemies:[{name:'Smoothie S',mark:'SM'},{name:'Super Zoro-H',mark:'ZR'},{name:'Luffy G4-S',mark:'LF'},{name:'Killer',mark:'KL'}],
  summon:[{name:'Swordsman',mark:'SS'},{name:'Gunner',mark:'GN'},{name:'Magician',mark:'MG'},{name:'Summoner',mark:'SM'},{name:'Archer',mark:'AR'}]
};
const SAVE='grandline-v6';
let state=load();
function defaults(){return{screen:'create',starter:null,name:'AmirDmor',level:179,power:7236349,gold:'8.346B',gems:'3.530B',tickets:12,vitality:'12548/50000',showCrew:false,showBattle:false,showSummon:false,selectedCrew:0,crewTab:'Crew',crewHp:[100,100,100,100],enemyHp:[100,100,100,100],battleLog:['Welcome to Pirate King - The Grand Line.'],summonLog:['Summon dock ready.']}}
function load(){try{return Object.assign(defaults(),JSON.parse(localStorage.getItem(SAVE)||'{}'))}catch{return defaults()}}
function save(){localStorage.setItem(SAVE,JSON.stringify(state))}
function starter(){return DATA.starters.find(x=>x.id===state.starter)||DATA.starters[3]}
function crewList(){const list=JSON.parse(JSON.stringify(DATA.crew));list[0].name=starter().name;list[0].role=starter().role;list[0].mark=starter().mark;return list}
function el(t,c,h){const x=document.createElement(t);if(c)x.className=c;if(h!==undefined)x.innerHTML=h;return x}
function btn(label,cls,fn){const b=document.createElement('button');b.className=cls||'';b.textContent=label;if(fn)b.onclick=fn;return b}
function mount(){const app=document.getElementById('app');app.innerHTML='';app.appendChild(state.screen==='create'?renderCreate():renderTown());app.appendChild(renderCrew());app.appendChild(renderBattle());app.appendChild(renderSummon())}
function toast(text){state.battleLog=[text].concat(state.battleLog).slice(0,6);save();mount()}
function silhouette(mark, className){return '<div class="'+className+'"><div class="label">'+mark+'</div><div class="silhouette"></div><div class="body"></div></div>'}
function renderCreate(){const wrap=el('div','screen active center-wrap');const card=el('div','card create-shell');card.appendChild(el('div','create-head','<h1>Create</h1><div class="small">Choose your wanted poster and start the voyage.</div>'));const board=el('div','create-board');const row=el('div','wanted-row');DATA.starters.forEach(h=>{const p=el('div','poster'+(state.starter===h.id?' selected':''));p.innerHTML='<div class="wanted">WANTED</div><div class="poster-art"><div class="class-tag">'+h.name+'</div><div class="class-mark">'+h.mark+'</div></div><div class="poster-role">'+h.role+'</div><div class="poster-bounty">B 1000000000</div>';p.onclick=()=>{state.starter=h.id;save();mount()};row.appendChild(p)});board.appendChild(row);card.appendChild(board);const foot=el('div','start-row');const selector=el('div','selector-bar');selector.appendChild(el('div','selector-fill'));selector.appendChild(el('div','selector-dice','R'));foot.appendChild(selector);foot.appendChild(el('div','small',state.starter?'Selected: '+starter().name:'Choose a hero poster first'));const start=btn('Start Game','alt',()=>{if(!state.starter)return;state.screen='town';save();mount()});start.disabled=!state.starter;foot.appendChild(start);card.appendChild(foot);wrap.appendChild(card);return wrap}
function renderTown(){const root=el('div','screen active');const top=el('div','topbar');top.innerHTML='<div class="top-left"><div class="avatar"><span>'+starter().mark+'</span></div><div class="name"><strong>'+state.name+'</strong><div class="power-row"><div class="pill">Lv.'+state.level+'</div><div class="pill">Power '+state.power.toLocaleString()+'</div><div class="pill">Vitality '+state.vitality+'</div></div></div></div>';const rs=el('div','resources');[['Gold',state.gold],['Gems',state.gems],['Tickets',state.tickets]].forEach(([n,v])=>rs.appendChild(el('div','res','<span>'+n+'</span><strong>'+v+'</strong>')));top.appendChild(rs);root.appendChild(top);
  const town=el('div','town-layout');
  const left=el('div','panel');left.appendChild(el('h2','','Town Status'));const leftBody=el('div','panel-body');const list=el('div','list');['Battle Available','Train Available','Kitchen Available','Study Available','Sail Available','Enhance Available','Mine Status','Event List'].forEach(x=>list.appendChild(el('div','item',x)));leftBody.appendChild(list);const chat=el('div','panel chat-box');chat.innerHTML='<h2>Chat</h2>';const log=el('div','chat-log');['[System] Welcome to Pirate King!','[Guild] Welcome to Pirate King!','Fully setup security methods to ensure account safety.'].forEach(x=>log.appendChild(el('div','item',x)));chat.appendChild(log);const tabs=el('div','chat-tabs');['World','Camp','Guild','PM','Cross','GM'].forEach(x=>tabs.appendChild(el('div','chat-tab',x)));chat.appendChild(tabs);leftBody.appendChild(chat);left.appendChild(leftBody);

  const center=el('div','panel');center.appendChild(el('h2','','Fishman Island'));const hub=el('div','hub');const icons=el('div','system-grid');DATA.topIcons.forEach(x=>{const i=el('div','system-btn',x);if(x.includes('ARENA'))i.onclick=()=>{state.showBattle=true;save();mount()};if(x==='WORLD')i.onclick=()=>toast('World map expands in next milestone.');icons.appendChild(i)});hub.appendChild(icons);const actions=el('div','action-grid');DATA.actions.forEach(x=>{const a=el('div','action-btn',x);if(x==='ARENA'||x==='BLOODY BATTLE')a.onclick=()=>{state.showBattle=true;save();mount()};if(x==='LIMITED EVENT'||x==='SHOP EVENT')a.onclick=()=>{state.showSummon=true;save();mount()};actions.appendChild(a)});hub.appendChild(actions);const world=el('div','world-stage');world.innerHTML=silhouette('NPC','sprite npc')+silhouette(starter().mark,'sprite player')+silhouette('PT','sprite pet')+silhouette('MT','sprite mount');hub.appendChild(world);hub.appendChild(el('div','vice-btn','Able call Vice Pet'));const mini=el('div','mini-menu');['World','Ship','Help','Source','Hide'].forEach(x=>mini.appendChild(el('div','item',x)));hub.appendChild(mini);const dock=el('div','dock');DATA.dock.forEach(x=>{const d=el('div','item',x);if(x==='CREW')d.onclick=()=>{state.showCrew=true;save();mount()};if(x==='TEAM'||x==='FORM')d.onclick=()=>{state.showBattle=true;save();mount()};if(x==='BAG'||x==='GEM'||x==='ENHC')d.onclick=()=>toast(x+' panel expands next.');dock.appendChild(d)});hub.appendChild(dock);center.appendChild(hub);

  const right=el('div','panel');right.appendChild(el('h2','','Quest Tracker'));const rightBody=el('div','panel-body');const q=el('div','list');DATA.quests.forEach(x=>q.appendChild(el('div','item',x)));rightBody.appendChild(q);rightBody.appendChild(el('div','item','System Time: 06:41:09'));rightBody.appendChild(el('div','item','Branch Fuka Boss 0/5'));rightBody.appendChild(el('div','item','Branch Zombie Generals 0/5'));right.appendChild(rightBody);

  town.appendChild(left);town.appendChild(center);town.appendChild(right);root.appendChild(town);return root}
function renderCrew(){const ov=el('div','overlay'+(state.showCrew?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Crew</h2>');head.appendChild(btn('Close','ghost',()=>{state.showCrew=false;save();mount()}));modal.appendChild(head);const tabs=el('div','tab-row');['Crew','Treasure','Gifts','Element'].forEach(t=>{const tab=el('div','tab'+(state.crewTab===t?' active':''),t);tab.onclick=()=>{state.crewTab=t;save();mount()};tabs.appendChild(tab)});modal.appendChild(tabs);const body=el('div','crew-layout');const list=el('div','crew-list');crewList().forEach((c,i)=>{const it=el('div','crew-entry'+(i===state.selectedCrew?' active':''),'<strong>'+c.name+'</strong><div class="small">'+c.rarity+' · '+c.role+'</div>');it.onclick=()=>{state.selectedCrew=i;save();mount()};list.appendChild(it)});const c=crewList()[state.selectedCrew];const center=el('div','sheet');const art=el('div','sheet-art','<div class="nameplate">'+c.mark+'</div><div class="silhouette"></div><div class="body"></div>');center.appendChild(art);const stats=el('div','');stats.appendChild(el('div','battle-card','<strong>Lv.'+state.level+' '+state.name+'</strong><div class="small">Skill: '+c.skill+'</div><div class="small">HP '+c.stats.hp+'</div>'));const sg=el('div','stats-grid');[['STR',c.stats.str],['AGI',c.stats.agi],['INT',c.stats.int],['P.Atk',c.stats.atk],['P.Def',c.stats.def],['M.Def',c.stats.mdef]].forEach(([a,v])=>sg.appendChild(el('div','slot','<strong>'+a+'</strong><div class="small">'+v+'</div>')));stats.appendChild(sg);const eq=el('div','equip');['Weapon','Helmet','Armor','Accessory','Fruit','Talent','Wing','Artifact'].forEach(x=>eq.appendChild(el('div','slot','<strong>'+x+'</strong><div class="small">Basic/Locked</div>')));stats.appendChild(eq);const row=el('div','row');row.appendChild(btn('Advance'));row.appendChild(btn('Skills','ghost'));row.appendChild(btn('Develop','ghost'));stats.appendChild(row);center.appendChild(stats);const right=el('div','');right.appendChild(el('div','battle-card','<strong>Equipment Items</strong><div class="small">Page 1 / 7</div>'));const inv=el('div','inventory-grid');for(let i=0;i<16;i++)inv.appendChild(el('div','slot',''));right.appendChild(inv);body.appendChild(list);body.appendChild(center);body.appendChild(right);modal.appendChild(body);ov.appendChild(modal);return ov}
function battleCard(name,mark,hp){const c=el('div','battle-card','<strong>'+name+'</strong><div class="small">'+mark+'</div>');const bar=el('div','hp');const fill=el('div','');fill.style.width=hp+'%';bar.appendChild(fill);c.appendChild(bar);return c}
function runBattle(){state.crewHp=state.crewHp.map(x=>Math.max(18,x-(Math.floor(Math.random()*12))));state.enemyHp=state.enemyHp.map(x=>Math.max(0,x-(18+Math.floor(Math.random()*26))));state.battleLog=[''+starter().name+' unleashes a combo slash.','Support buffs trigger across the formation.','Enemy team is pushed back.',state.enemyHp.every(x=>x===0)?'Victory! Rewards gained.':'Battle continues...'];if(state.enemyHp.every(x=>x===0)){state.gold='8.347B';state.gems='3.531B';state.enemyHp=[100,100,100,100];state.crewHp=[100,100,100,100]}save();mount()}
function renderBattle(){const ov=el('div','overlay'+(state.showBattle?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Battle Arena</h2>');head.appendChild(btn('Close','ghost',()=>{state.showBattle=false;save();mount()}));modal.appendChild(head);const wrap=el('div','battle-wrap');wrap.appendChild(el('div','battle-top','<div><strong>'+state.name+'</strong><div class="small">Rounds 01</div></div><div><strong>System Enemy</strong><div class="small">Arena Match</div></div>'));const grid=el('div','battle-grid');const left=el('div','team');crewList().slice(0,4).forEach((c,i)=>left.appendChild(battleCard(c.name,c.mark,state.crewHp[i])));const right=el('div','team');DATA.enemies.forEach((c,i)=>right.appendChild(battleCard(c.name,c.mark,state.enemyHp[i])));grid.appendChild(left);grid.appendChild(right);wrap.appendChild(grid);const eff=el('div','effect-layer');eff.appendChild(el('div','effect e1'));eff.appendChild(el('div','effect e2'));eff.appendChild(el('div','effect e3'));eff.appendChild(el('div','effect e4'));eff.appendChild(el('div','pulse-ring'));wrap.appendChild(eff);const row=el('div','row');row.appendChild(btn('Fight','',runBattle));row.appendChild(btn('Auto','ghost',()=>{for(let i=0;i<3;i++)setTimeout(runBattle,i*350)}));row.appendChild(btn('Skip','ghost',()=>{state.enemyHp=[0,0,0,0];runBattle()}));wrap.appendChild(row);const log=el('div','battle-log');state.battleLog.forEach(x=>log.appendChild(el('div','battle-card',x)));wrap.appendChild(log);modal.appendChild(wrap);ov.appendChild(modal);return ov}
function doSummon(count){let pulls=[];for(let i=0;i<count;i++){const pick=DATA.summon[Math.floor(Math.random()*DATA.summon.length)];pulls.push('Pulled '+pick.name+' ['+pick.mark+']');if(state.tickets>0)state.tickets-=1;}state.summonLog=pulls.concat(state.summonLog).slice(0,8);save();mount()}
function renderSummon(){const ov=el('div','overlay'+(state.showSummon?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Summon Dock</h2>');head.appendChild(btn('Close','ghost',()=>{state.showSummon=false;save();mount()}));modal.appendChild(head);const body=el('div','summon-layout');const stage=el('div','summon-stage');DATA.summon.forEach(x=>stage.appendChild(el('div','summon-poster','<div class="art"></div><strong>'+x.name+'</strong><div class="small">Class '+x.mark+'</div>')));const side=el('div','');side.appendChild(el('div','summon-card','<strong>Tickets</strong><div class="small">'+state.tickets+'</div>'));const row=el('div','row');row.appendChild(btn('Single Summon','',()=>doSummon(1)));row.appendChild(btn('Ten Summons','ghost',()=>doSummon(10)));side.appendChild(row);const log=el('div','battle-log');state.summonLog.forEach(x=>log.appendChild(el('div','summon-card',x)));side.appendChild(log);body.appendChild(stage);body.appendChild(side);modal.appendChild(body);ov.appendChild(modal);return ov}
mount();
</script>
</body>
</html>
