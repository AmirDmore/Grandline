<script>
const DATA={starters:[{id:'summoner',name:'Summoner',role:'SUMMONER',mark:'SM'},{id:'swordwomen',name:'Swordwomen',role:'SWORDWOMEN',mark:'SW'},{id:'magician',name:'Magician',role:'MAGICIAN',mark:'MG'},{id:'swordsman',name:'Swordsman',role:'SWORDSMAN',mark:'SS'},{id:'gunner',name:'Gunner',role:'GUNNER',mark:'GN'},{id:'archer',name:'Archer',role:'ARCHER',mark:'AR'}],topIcons:['TOP UP','GIFT','SALARY','ACTIVITY','DAY TASK','DAILY','SPIRIT','BATTLE ARENA','ARENA WAR','WORLD'],actions:['GROWTH TREE','GIFTS','LIMITED EVENT','SHOP EVENT','FORTUNE WHEEL','DIGGING TREASURE','ALL BLUE','HAKI','PRODUCTION','TR. HUNT','ARENA','INTER-SERVER','CHECKPOINT','BLOODY BATTLE','IMPEL DOWN'],dock:['PIRATE SHIP','DIARY','FLAG PIRATE','CREW','PET','EIF','BAG','FORM','GEM','ENHC','ZODIAC','RSCH','SOCIAL','TEAM','INFO','EXP'],quests:['Defeat Fuka Boss 0/5','Defeat Zombie Generals 0/5','Beat Puzzle 0/5','Upgrade one gear piece','Win one arena battle'],crew:[{name:'Starter Hero',rarity:'Epic',role:'Captain',mark:'CP',stats:{str:218,agi:226,int:220,atk:71909,def:66638,mdef:52920,hp:'2.7B/2.8B'},skill:'Thermal Heat'},{name:'Captain Blaze',rarity:'Epic',role:'Warrior',mark:'CB',stats:{str:210,agi:188,int:120,atk:62100,def:42000,mdef:30000,hp:'1.8B/1.8B'},skill:'Blazing Rush'},{name:'Grave Singer Nyx',rarity:'Legendary',role:'Mage',mark:'NY',stats:{str:120,agi:170,int:260,atk:80200,def:31000,mdef:41000,hp:'1.4B/1.5B'},skill:'Void Chorus'},{name:'Storm Giant Grom',rarity:'Legendary',role:'Tank',mark:'GG',stats:{str:280,agi:90,int:110,atk:70000,def:80220,mdef:52000,hp:'3.2B/3.5B'},skill:'Thunder Guard'},{name:'Oracle Sera',rarity:'Mythic',role:'Support',mark:'OS',stats:{str:140,agi:200,int:300,atk:84000,def:38000,mdef:63000,hp:'1.9B/2.0B'},skill:'Fate Shift'}],enemies:[{name:'Smoothie S',mark:'SM'},{name:'Super Zoro-H',mark:'ZR'},{name:'Luffy G4-S',mark:'LF'},{name:'Killer',mark:'KL'}],summon:[{name:'Swordsman',mark:'SS'},{name:'Gunner',mark:'GN'},{name:'Magician',mark:'MG'},{name:'Summoner',mark:'SM'},{name:'Archer',mark:'AR'}],bag:['Steel Blade','Dragon Helm','Spirit Ore','Relic Dust','Treasure Map','Sea Crystal','Fruit Core','Arena Token','Ancient Coin','Gold Chest','Ship Part','Pet Feed'],ships:['Flag Pirate','Vice Cruiser','Aqua Frigate'],gems:['Ruby','Sapphire','Emerald','Amethyst','Topaz','Obsidian'],campaign:[{name:'Windward Isles',base:180000},{name:'Sandstorm Dominion',base:260000},{name:'Skyreach Atoll',base:340000},{name:'Fishman Island',base:480000},{name:'Titan Gate',base:620000}],tasks:[{id:'battle1',name:'Clear 1 battle',reward:'+30 Gems'},{id:'upgrade1',name:'Upgrade 1 equipment slot',reward:'+50,000 Gold'},{id:'summon1',name:'Use 1 summon',reward:'+1 Ticket'},{id:'arena3',name:'Win 3 arena battles',reward:'+Relic Dust'}]};
const SAVE='grandline-game-v3'; let state=load();
function defaults(){return{screen:'create',starter:null,name:'AmirDmor',level:179,power:7236349,goldNum:8346000000,gemsNum:3530000000,tickets:12,vitality:'12548/50000',showCrew:false,showBattle:false,showSummon:false,showBag:false,showForm:false,showShip:false,showTasks:false,selectedCrew:0,crewTab:'Crew',crewHp:[100,100,100,100],enemyHp:[100,100,100,100],battleLog:['Welcome to Pirate King - The Grand Line.'],summonLog:['Summon dock ready.'],form:[0,1,2,3,null,null],campaignIndex:3,stageIndex:0,stageClears:{},battlesWon:0,summonsUsed:0,equipmentUpgrades:0,claimedTasks:{},bagCounts:{'Steel Blade':1,'Dragon Helm':1,'Spirit Ore':12,'Relic Dust':5,'Treasure Map':3,'Sea Crystal':4,'Fruit Core':2,'Arena Token':10,'Ancient Coin':25,'Gold Chest':1,'Ship Part':7,'Pet Feed':18},equipLv:{Weapon:1,Helmet:1,Armor:1,Accessory:1,Fruit:1,Talent:1,Wing:1,Artifact:1},shipLv:{Hull:1,Cannon:1,Sail:1}}}
function load(){try{return Object.assign(defaults(),JSON.parse(localStorage.getItem(SAVE)||'{}'))}catch{return defaults()}}
function save(){localStorage.setItem(SAVE,JSON.stringify(state))}
function fmtBig(n){if(n>=1e9)return (n/1e9).toFixed(3).replace(/\.000$/,'')+'B';if(n>=1e6)return (n/1e6).toFixed(3).replace(/\.000$/,'')+'M';if(n>=1e3)return (n/1e3).toFixed(1)+'K';return String(n)}
function starter(){return DATA.starters.find(x=>x.id===state.starter)||DATA.starters[3]}
function crewList(){const list=JSON.parse(JSON.stringify(DATA.crew));list[0].name=starter().name;list[0].role=starter().role;list[0].mark=starter().mark;const bonus=Object.values(state.equipLv).reduce((a,b)=>a+b,0);list.forEach(c=>{c.stats.atk+=bonus*120;c.stats.def+=bonus*80;c.stats.mdef+=bonus*65});return list}
function currentStages(){const base=DATA.campaign[state.campaignIndex].base;return [0,1,2].map(i=>({name:'Stage '+(i+1),power:base+(i*45000),key:state.campaignIndex+'-'+i,cleared:!!state.stageClears[state.campaignIndex+'-'+i]}))}
function el(t,c,h){const x=document.createElement(t);if(c)x.className=c;if(h!==undefined)x.innerHTML=h;return x}
function btn(label,cls,fn){const b=document.createElement('button');b.className=cls||'';b.textContent=label;if(fn)b.onclick=fn;return b}
function mount(){const app=document.getElementById('app');app.innerHTML='';app.appendChild(state.screen==='create'?renderCreate():renderTown());app.appendChild(renderCrew());app.appendChild(renderBattle());app.appendChild(renderSummon());app.appendChild(renderBag());app.appendChild(renderForm());app.appendChild(renderShip());app.appendChild(renderTasks())}
function toast(text){state.battleLog=[text].concat(state.battleLog).slice(0,6);save();mount()}
function sprite(mark,cls){return '<div class="'+cls+'"><div class="label">'+mark+'</div><div class="head"></div><div class="body"></div></div>'}
function renderCreate(){const wrap=el('div','screen active center');const card=el('div','card create-wrap');card.appendChild(el('div','create-head','<h1>Create</h1><div class="small">Choose your wanted poster and start the voyage.</div>'));const stage=el('div','create-stage');stage.appendChild(el('div','map-bg'));const row=el('div','poster-layout');DATA.starters.forEach(h=>{const p=el('div','poster'+(state.starter===h.id?' selected':''));p.innerHTML='<div class="wanted">WANTED</div><div class="poster-art"><div class="tag">'+h.name+'</div><div class="mark">'+h.mark+'</div></div><div class="role">'+h.role+'</div><div class="bounty">B 1000000000</div>';p.onclick=()=>{state.starter=h.id;save();mount()};row.appendChild(p)});stage.appendChild(row);stage.appendChild(el('div','logo-left gold','GRAND LINE'));stage.appendChild(el('div','logo-right','MMOS'));card.appendChild(stage);const foot=el('div','create-foot');foot.appendChild(el('div','selector'));foot.appendChild(el('div','small',state.starter?'Selected: '+starter().name:'Choose a hero poster first'));const start=btn('Start Game','alt start-btn',()=>{if(!state.starter)return;state.screen='town';save();mount()});start.disabled=!state.starter;foot.appendChild(start);card.appendChild(foot);wrap.appendChild(card);return wrap}
function renderTown(){const root=el('div','screen active');const top=el('div','topbar');top.innerHTML='<div class="top-left"><div class="avatar"><span>'+starter().mark+'</span></div><div class="name"><strong>'+state.name+'</strong><div class="power-row"><div class="pill">Lv.'+state.level+'</div><div class="pill">Power '+state.power.toLocaleString()+'</div><div class="pill">Vitality '+state.vitality+'</div></div></div></div>';const rs=el('div','resources');[['Gold',fmtBig(state.goldNum)],['Gems',fmtBig(state.gemsNum)],['Tickets',state.tickets]].forEach(([n,v])=>rs.appendChild(el('div','res','<span>'+n+'</span><strong>'+v+'</strong>')));top.appendChild(rs);root.appendChild(top);const shell=el('div','shell');const left=el('div','panel');left.appendChild(el('h2','','Town Status'));const lb=el('div','panel-body');const l=el('div','grid');['Battle Available','Train Available','Kitchen Available','Study Available','Sail Available','Enhance Available','Mine Status','Event List'].forEach(x=>l.appendChild(el('div','item',x)));lb.appendChild(l);const chat=el('div','panel chat-box');chat.innerHTML='<h2>Chat</h2>';const log=el('div','chat-log');['[System] Welcome to Pirate King!','[Guild] Welcome to Pirate King!','Fully setup security methods to ensure account safety.'].forEach(x=>log.appendChild(el('div','item',x)));chat.appendChild(log);const tabs=el('div','chat-tabs');['World','Camp','Guild','PM','Cross','GM'].forEach(x=>tabs.appendChild(el('div','chat-tab',x)));chat.appendChild(tabs);lb.appendChild(chat);left.appendChild(lb);const center=el('div','panel');center.appendChild(el('h2','','Fishman Island'));const hub=el('div','hub');const systems=el('div','icon-grid');DATA.topIcons.forEach(x=>{const i=el('div','tile',x);if(x.includes('ARENA'))i.onclick=()=>{state.showBattle=true;save();mount()};if(x==='WORLD')i.onclick=()=>toast('World map expands in next milestone.');systems.appendChild(i)});hub.appendChild(systems);const actions=el('div','action-grid');DATA.actions.forEach(x=>{const a=el('div','action',x);if(x==='ARENA'||x==='BLOODY BATTLE')a.onclick=()=>{state.showBattle=true;save();mount()};if(x==='LIMITED EVENT'||x==='SHOP EVENT')a.onclick=()=>{state.showSummon=true;save();mount()};actions.appendChild(a)});hub.appendChild(actions);const camp=el('div','campaign-strip');DATA.campaign.forEach((c,i)=>{const n=el('div','campaign-node'+(state.campaignIndex===i?' active':''),'<strong>'+c.name+'</strong><div class="small">Base '+c.base.toLocaleString()+'</div>');n.onclick=()=>{state.campaignIndex=i;state.stageIndex=0;save();mount()};camp.appendChild(n)});hub.appendChild(camp);const stages=el('div','stage-strip');currentStages().forEach((s,i)=>{const card=el('div','stage-card'+(state.stageIndex===i?' active':'')+(s.cleared?' cleared':''),'<strong>'+s.name+'</strong><div class="small">Enemy '+s.power.toLocaleString()+'</div><div class="small">'+(s.cleared?'Cleared':'Open')+'</div>');card.onclick=()=>{state.stageIndex=i;save();mount()};stages.appendChild(card)});hub.appendChild(stages);const world=el('div','world-stage');world.innerHTML=sprite('NPC','sprite npc')+sprite(starter().mark,'sprite player')+sprite('PT','sprite pet')+sprite('MT','sprite mount');hub.appendChild(world);hub.appendChild(el('div','vice','Able call Vice Pet'));const mini=el('div','mini');['World','Ship','Help','Source','Hide'].forEach(x=>{const it=el('div','item',x);if(x==='Ship')it.onclick=()=>{state.showShip=true;save();mount()};mini.appendChild(it)});hub.appendChild(mini);const dock=el('div','dock');DATA.dock.forEach(x=>{const d=el('div','item',x);if(x==='CREW')d.onclick=()=>{state.showCrew=true;save();mount()};if(x==='TEAM'||x==='FORM')d.onclick=()=>{state.showForm=true;save();mount()};if(x==='BAG')d.onclick=()=>{state.showBag=true;save();mount()};if(x==='GEM')d.onclick=()=>{state.showSummon=true;save();mount()};dock.appendChild(d)});hub.appendChild(dock);center.appendChild(hub);const right=el('div','panel');right.appendChild(el('h2','','Quest Tracker'));const rb=el('div','panel-body grid');DATA.tasks.forEach(t=>{const done=isTaskDone(t.id);rb.appendChild(el('div','item','<strong>'+t.name+'</strong><div class="small">'+t.reward+'</div><div class="small">'+(done?'Ready to claim':'In progress')+'</div>'))});rb.appendChild(btn('Daily Tasks','ghost',()=>{state.showTasks=true;save();mount()}));rb.appendChild(btn('Open Bag','ghost',()=>{state.showBag=true;save();mount()}));rb.appendChild(btn('Open Summon','ghost',()=>{state.showSummon=true;save();mount()}));rb.appendChild(btn('Battle Current Stage','',()=>{state.showBattle=true;save();mount()}));right.appendChild(rb);shell.appendChild(left);shell.appendChild(center);shell.appendChild(right);root.appendChild(shell);return root}
function upgradeEquip(key){const cost=50000*state.equipLv[key];if(state.goldNum<cost)return toast('Not enough gold.');state.goldNum-=cost;state.equipLv[key]+=1;state.equipmentUpgrades+=1;state.power+=4000;save();mount()}
function renderCrew(){const ov=el('div','overlay'+(state.showCrew?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Crew</h2>');head.appendChild(btn('Close','ghost',()=>{state.showCrew=false;save();mount()}));modal.appendChild(head);const tabs=el('div','tab-row');['Crew','Treasure','Gifts','Element'].forEach(t=>{const tab=el('div','tab'+(state.crewTab===t?' active':''),t);tab.onclick=()=>{state.crewTab=t;save();mount()};tabs.appendChild(tab)});modal.appendChild(tabs);const body=el('div','crew-layout');const list=el('div','crew-list');crewList().forEach((c,i)=>{const it=el('div','crew-entry'+(i===state.selectedCrew?' active':''),'<strong>'+c.name+'</strong><div class="small">'+c.rarity+' · '+c.role+'</div>');it.onclick=()=>{state.selectedCrew=i;save();mount()};list.appendChild(it)});const c=crewList()[state.selectedCrew];const center=el('div','sheet');const art=el('div','sheet-art','<div class="nameplate">'+c.mark+'</div><div class="head"></div><div class="body"></div>');center.appendChild(art);const stats=el('div','');stats.appendChild(el('div','battle-card','<strong>Lv.'+state.level+' '+state.name+'</strong><div class="small">Skill: '+c.skill+'</div><div class="small">HP '+c.stats.hp+'</div>'));const sg=el('div','stats-grid');[['STR',c.stats.str],['AGI',c.stats.agi],['INT',c.stats.int],['P.Atk',c.stats.atk],['P.Def',c.stats.def],['M.Def',c.stats.mdef]].forEach(([a,v])=>sg.appendChild(el('div','slot','<strong>'+a+'</strong><div class="small">'+v+'</div>')));stats.appendChild(sg);const eq=el('div','equip');['Weapon','Helmet','Armor','Accessory','Fruit','Talent','Wing','Artifact'].forEach(x=>{const box=el('div','slot','<strong>'+x+'</strong><div class="small">Lv.'+state.equipLv[x]+'</div><div class="small">Cost '+fmtBig(50000*state.equipLv[x])+'</div>');box.onclick=()=>upgradeEquip(x);eq.appendChild(box)});stats.appendChild(eq);const row=el('div','row');row.appendChild(btn('Battle','ghost',()=>{state.showCrew=false;state.showBattle=true;save();mount()}));stats.appendChild(row);center.appendChild(stats);const right=el('div','');right.appendChild(el('div','battle-card','<strong>Equipment Levels</strong><div class="small">Upgrade by clicking slots</div>'));const inv=el('div','inventory-grid');for(let i=0;i<16;i++)inv.appendChild(el('div','slot',''));right.appendChild(inv);body.appendChild(list);body.appendChild(center);body.appendChild(right);modal.appendChild(body);ov.appendChild(modal);return ov}
function stagePower(){return currentStages()[state.stageIndex].power}
function runBattle(){const player=state.power+Math.floor(Math.random()*120000);const enemy=stagePower()+Math.floor(Math.random()*80000);const win=player>=enemy;state.battleLog=['Battle at '+currentStages()[state.stageIndex].name+'.','Your power: '+player.toLocaleString(),'Enemy power: '+enemy.toLocaleString(),win?'Victory!':'Defeat.'];if(win){const key=state.campaignIndex+'-'+state.stageIndex;state.stageClears[key]=true;state.goldNum+=120000;state.gemsNum+=30;state.battlesWon+=1;state.bagCounts['Relic Dust']=(state.bagCounts['Relic Dust']||0)+1;}state.enemyHp=[100,100,100,100];state.crewHp=[100,100,100,100];save();mount()}
function renderBattle(){const ov=el('div','overlay'+(state.showBattle?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Battle Arena</h2>');head.appendChild(btn('Close','ghost',()=>{state.showBattle=false;save();mount()}));modal.appendChild(head);const wrap=el('div','battle-wrap');wrap.appendChild(el('div','battle-top','<div><strong>'+state.name+'</strong><div class="small">'+DATA.campaign[state.campaignIndex].name+' · '+currentStages()[state.stageIndex].name+'</div></div><div><strong>System Enemy</strong><div class="small">Target '+stagePower().toLocaleString()+'</div></div>'));const grid=el('div','battle-grid');const left=el('div','team');crewList().slice(0,4).forEach((c,i)=>left.appendChild(battleCard(c.name,c.mark,100)));const right=el('div','team');DATA.enemies.forEach((c,i)=>right.appendChild(battleCard(c.name,c.mark,100)));grid.appendChild(left);grid.appendChild(right);wrap.appendChild(grid);const eff=el('div','effect-layer');['e1','e2','e3','e4'].forEach(c=>eff.appendChild(el('div','effect '+c)));eff.appendChild(el('div','pulse-ring'));wrap.appendChild(eff);const row=el('div','row');row.appendChild(btn('Fight','',runBattle));wrap.appendChild(row);const log=el('div','battle-log');state.battleLog.forEach(x=>log.appendChild(el('div','battle-card',x)));wrap.appendChild(log);modal.appendChild(wrap);ov.appendChild(modal);return ov}
function battleCard(name,mark,hp){const c=el('div','battle-card','<strong>'+name+'</strong><div class="small">'+mark+'</div>');const bar=el('div','hp');const fill=el('div','');fill.style.width=hp+'%';bar.appendChild(fill);c.appendChild(bar);return c}
function doSummon(count){let pulls=[];for(let i=0;i<count;i++){if(state.tickets<=0&&state.gemsNum<300)break;const pick=DATA.summon[Math.floor(Math.random()*DATA.summon.length)];pulls.push('Pulled '+pick.name+' ['+pick.mark+']');if(state.tickets>0)state.tickets-=1;else state.gemsNum-=300;state.summonsUsed+=1;state.bagCounts['Ancient Coin']=(state.bagCounts['Ancient Coin']||0)+5;}state.summonLog=pulls.concat(state.summonLog).slice(0,8);save();mount()}
function renderSummon(){const ov=el('div','overlay'+(state.showSummon?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Summon Dock</h2>');head.appendChild(btn('Close','ghost',()=>{state.showSummon=false;save();mount()}));modal.appendChild(head);const body=el('div','summon-layout');const stage=el('div','summon-stage');DATA.summon.forEach(x=>stage.appendChild(el('div','summon-poster','<div class="art"></div><strong>'+x.name+'</strong><div class="small">Class '+x.mark+'</div>')));const side=el('div','');side.appendChild(el('div','summon-card','<strong>Tickets</strong><div class="small">'+state.tickets+'</div><div class="small">Gems '+fmtBig(state.gemsNum)+'</div>'));const row=el('div','row');row.appendChild(btn('Single Summon','',()=>doSummon(1)));row.appendChild(btn('Ten Summons','ghost',()=>doSummon(10)));side.appendChild(row);const log=el('div','battle-log');state.summonLog.forEach(x=>log.appendChild(el('div','summon-card',x)));side.appendChild(log);body.appendChild(stage);body.appendChild(side);modal.appendChild(body);ov.appendChild(modal);return ov}
function renderBag(){const ov=el('div','overlay'+(state.showBag?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Bag</h2>');head.appendChild(btn('Close','ghost',()=>{state.showBag=false;save();mount()}));modal.appendChild(head);const body=el('div','bag-layout');const left=el('div','panel');left.appendChild(el('h2','','Inventory'));const grid=el('div','panel-body bag-grid');Object.entries(state.bagCounts).forEach(([k,v])=>grid.appendChild(el('div','bag-card','<strong>'+k+'</strong><div class="small">Qty '+v+'</div>')));left.appendChild(grid);const right=el('div','panel');right.appendChild(el('h2','','Quick Info'));const rb=el('div','panel-body grid');rb.appendChild(el('div','item','Ships: '+DATA.ships.join(', ')));rb.appendChild(el('div','item','Gems: '+DATA.gems.join(', ')));rb.appendChild(el('div','item','Bag contents now persist in save data.'));right.appendChild(rb);body.appendChild(left);body.appendChild(right);modal.appendChild(body);ov.appendChild(modal);return ov}
function renderForm(){const ov=el('div','overlay'+(state.showForm?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Form / Team</h2>');head.appendChild(btn('Close','ghost',()=>{state.showForm=false;save();mount()}));modal.appendChild(head);const body=el('div','form-layout');const left=el('div','panel');left.appendChild(el('h2','','Formation'));const slots=el('div','panel-body form-slots');state.form.forEach(idx=>{if(idx===null)slots.appendChild(el('div','form-slot','<div class="small">Empty Slot</div>'));else {const c=crewList()[idx];slots.appendChild(el('div','form-slot','<strong>'+c.name+'</strong><div class="small">'+c.role+'</div><div class="small">Class '+c.mark+'</div>'))}});left.appendChild(slots);const right=el('div','panel');right.appendChild(el('h2','','Team Actions'));const rb=el('div','panel-body grid');rb.appendChild(el('div','item','Formation power recalculation will be expanded next.'));rb.appendChild(el('div','item','Current squad size: '+state.form.filter(x=>x!==null).length));rb.appendChild(btn('Battle','',()=>{state.showForm=false;state.showBattle=true;save();mount()}));right.appendChild(rb);body.appendChild(left);body.appendChild(right);modal.appendChild(body);ov.appendChild(modal);return ov}
function renderShip(){const ov=el('div','overlay'+(state.showShip?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Ship</h2>');head.appendChild(btn('Close','ghost',()=>{state.showShip=false;save();mount()}));modal.appendChild(head);const body=el('div','ship-layout');const left=el('div','panel');left.appendChild(el('h2','','Fleet'));const lb=el('div','panel-body grid');DATA.ships.forEach((s,i)=>lb.appendChild(el('div','ship-card','<strong>'+s+'</strong><div class="small">Hull Tier '+(i+1)+'</div>')));left.appendChild(lb);const right=el('div','panel');right.appendChild(el('h2','','Ship Upgrade'));const rb=el('div','panel-body grid');['Hull','Cannon','Sail'].forEach(k=>{const cost=100000*state.shipLv[k];const it=el('div','item','<strong>'+k+'</strong><div class="small">Lv.'+state.shipLv[k]+' · Cost '+fmtBig(cost)+'</div>');it.onclick=()=>{if(state.goldNum<cost)return;state.goldNum-=cost;state.shipLv[k]+=1;state.power+=2500;save();mount()};rb.appendChild(it)});right.appendChild(rb);body.appendChild(left);body.appendChild(right);modal.appendChild(body);ov.appendChild(modal);return ov}
function isTaskDone(id){if(id==='battle1')return state.battlesWon>=1;if(id==='upgrade1')return state.equipmentUpgrades>=1;if(id==='summon1')return state.summonsUsed>=1;if(id==='arena3')return state.battlesWon>=3;return false}
function claimTask(id){if(state.claimedTasks[id]||!isTaskDone(id))return;state.claimedTasks[id]=true;if(id==='battle1')state.gemsNum+=30;if(id==='upgrade1')state.goldNum+=50000;if(id==='summon1')state.tickets+=1;if(id==='arena3')state.bagCounts['Relic Dust']=(state.bagCounts['Relic Dust']||0)+3;save();mount()}
function renderTasks(){const ov=el('div','overlay'+(state.showTasks?' active':''));const modal=el('div','modal');const head=el('div','modal-head','<h2>Daily Tasks</h2>');head.appendChild(btn('Close','ghost',()=>{state.showTasks=false;save();mount()}));modal.appendChild(head);const body=el('div','tasks-layout');const left=el('div','panel');left.appendChild(el('h2','','Available Tasks'));const lb=el('div','panel-body grid');DATA.tasks.forEach(t=>{const done=isTaskDone(t.id);const claimed=!!state.claimedTasks[t.id];const card=el('div','task-card','<strong>'+t.name+'</strong><div class="small">Reward: '+t.reward+'</div><div class="small">'+(claimed?'Claimed':done?'Ready':'In progress')+'</div>');const actions=el('div','row');actions.appendChild(btn(claimed?'Claimed':done?'Claim':'Locked',claimed||!done?'ghost':'',()=>claimTask(t.id)));card.appendChild(actions);lb.appendChild(card)});left.appendChild(lb);const right=el('div','panel');right.appendChild(el('h2','','Progress'));const rb=el('div','panel-body grid');rb.appendChild(el('div','item','Battles won: '+state.battlesWon));rb.appendChild(el('div','item','Summons used: '+state.summonsUsed));rb.appendChild(el('div','item','Equipment upgrades: '+state.equipmentUpgrades));right.appendChild(rb);body.appendChild(left);body.appendChild(right);modal.appendChild(body);ov.appendChild(modal);return ov}
mount();
</script>
</body>
</html>
